statement: |
  Candidate counterexample to the statement: every finite connected simple
  graph with minimum degree at least 2 has a Hamiltonian cycle.

  Let G be the complete bipartite graph K_{2,3}. Its vertex set is partitioned
  into A = {a1, a2} and B = {b1, b2, b3}. Its edge set contains exactly the
  six cross-part edges:

  - a1-b1
  - a1-b2
  - a1-b3
  - a2-b1
  - a2-b2
  - a2-b3

  Under the standard finite simple undirected graph convention, G is connected
  and has minimum degree 2: vertices in A have degree 3, and vertices in B
  have degree 2.

  The candidate non-Hamiltonicity reason is that every cycle in a bipartite
  graph alternates between the two parts, so a Hamiltonian cycle would have to
  use the same number of vertices from A and B. K_{2,3} has unequal part sizes
  2 and 3, so this candidate should have no Hamiltonian cycle.

  This artifact is a draft candidate only. R3.2 must attach reproducible
  checker evidence before the workflow treats this as checked evidence.
