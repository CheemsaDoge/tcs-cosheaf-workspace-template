name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TCS-Cosheaf
        run: make install

      - name: Inspect framework version
        run: cosheaf version

      - name: Inspect workspace
        run: make workspace-info

      - name: Validate workspace
        run: make validate

      - name: Run gatekeeper
        run: make gate

      - name: Rebuild workspace index
        run: make index

      - name: Run PR checklist gate
        run: make pr-checklist

      - name: Build example issue context
        run: make context

      - name: Check whitespace
        run: git diff --check
